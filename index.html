<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7 Airlines • ULLI DISPATCH</title>
    <style>
        :root {
            --s7-lime: #b6da22;       
            --bg-color: #0b130a;       
            --card-bg: #162414;        
            --text-main: #ffffff;
            --text-muted: #8fa48c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding-bottom: 50px;
        }

        /* Большой верхний баннер в стиле Google Sites */
        .hero-banner {
            width: 100%;
            height: 320px;
            background-image: url('https://wikimedia.org');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 19, 10, 0.45);
        }

        .hero-title {
            position: relative;
            z-index: 2;
            font-size: 46px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
            text-transform: uppercase;
            margin: 0;
        }
        .hero-title span { color: var(--s7-lime); }

        .hero-subtitle {
            position: relative;
            z-index: 2;
            font-size: 14px;
            font-weight: bold;
            color: var(--s7-lime);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Карточки-контейнеры */
        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            width: 92%;
            max-width: 550px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(182, 218, 34, 0.12);
            position: relative;
            overflow: hidden; 
            box-sizing: border-box;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--s7-lime);
            z-index: 10;
        }

        .bg-aircraft {
            position: absolute;
            bottom: -5px;
            right: -25px;
            width: 290px; 
            height: auto;
            opacity: 0.14;
            pointer-events: none; 
            z-index: 1;
        }

        .header-block, .clocks-grid, .metar-section, .tabs-container, .table-wrapper {
            position: relative;
            z-index: 5;
        }

        .header-block { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-text { font-size: 22px; font-weight: 900; color: #ffffff; letter-spacing: -0.5px; }
        .logo-text span { color: var(--s7-lime); }
        .subtitle { color: var(--text-muted); margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        .clocks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .clock-card { background: rgba(11, 19, 10, 0.7); padding: 12px; border-radius: 10px; border-left: 4px solid var(--s7-lime); }
        .clock-card.local { border-left-color: #ffffff; }
        .clock-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
        .clock-time { font-size: 22px; font-weight: 700; font-family: monospace; letter-spacing: 0.5px; }

        .metar-section { background: rgba(11, 19, 10, 0.85); border-radius: 10px; padding: 12px; border: 1px solid rgba(182, 218, 34, 0.15); margin-bottom: 15px; }
        .metar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .metar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .status { font-size: 10px; font-weight: bold; color: var(--s7-lime); text-transform: uppercase; }

        .metar-string {
            font-family: 'Courier New', Courier, monospace; font-size: 14px; color: var(--s7-lime); 
            line-height: 1.4; background: #050805; padding: 12px; border-radius: 8px;
            border: 1px solid rgba(182, 218, 34, 0.15); margin: 0; white-space: pre-wrap;
        }

        .tabs-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: rgba(11, 19, 10, 0.6); color: var(--text-muted); border: 1px solid rgba(182, 218, 34, 0.15); padding: 7px 18px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { background: var(--s7-lime); color: #0b130a; border-color: var(--s7-lime); }

        .table-wrapper { background: #050805; border-radius: 10px; border: 1px solid rgba(182, 218, 34, 0.15); overflow: hidden; }
        .flight-table { width: 100%; border-collapse: collapse; font-family: monospace; font-size: 13px; display: none; }
        .flight-table.active { display: table; }
        .flight-table th { background: rgba(11, 19, 10, 0.8); color: var(--text-muted); text-align: left; padding: 10px; font-size: 11px; border-bottom: 1px solid rgba(182, 218, 34, 0.15); }
        .flight-table td { padding: 12px 10px; border-bottom: 1px solid rgba(182, 218, 34, 0.05); color: #e2e8f0; }

        .flight-no { color: #ffffff; font-weight: bold; }
        .status-green { color: var(--s7-lime); font-weight: bold; }
        .status-yellow { color: #f59e0b; font-weight: bold; }
        .company-tag { font-size: 10px; background: rgba(255, 255, 255, 0.08); padding: 2px 5px; border-radius: 4px; color: #94a3b8; display: block; margin-top: 2px; width: fit-content; }
    </style>
</head>
<body>

    </div>

    <!-- КАРТОЧКА 2: ОНЛАЙН-ТАБЛО РЕЙСОВ -->
    <div class="container">
        <div class="header-block">
            <div class="logo-text" style="font-size:18px;">💻 ТАБЛО РЕЙСОВ</div>
            <div class="subtitle" style="color:var(--s7-lime);">100% REALTIME</div>
        </div>
        
        <div class="tabs-container">
            <div class="tab-btn active" id="btn-dep" onclick="switchTab('dep')">🛫 Взлет</div>
            <div class="tab-btn" id="btn-arr" onclick="switchTab('arr')">🛬 Посадка</div>

        <div class="table-wrapper">

                <tbody id="arr-body"></tbody>
            </table>
        </div>
    </div>
